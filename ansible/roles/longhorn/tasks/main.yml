---
- name: Install Longhorn via Helm
  delegate_to: localhost
  become: false
  run_once: true
  kubernetes.core.helm:
    name: longhorn
    chart_ref: longhorn
    chart_repo_url: https://charts.longhorn.io
    chart_version: "{{ longhorn_chart_version }}"
    release_namespace: longhorn-system
    create_namespace: true
    wait: true
    timeout: 10m0s
    kubeconfig: "{{ playbook_dir }}/../kubeconfig"
    values:
      defaultSettings:
        defaultDataPath: "{{ longhorn_mount }}"   # the /dev/sda mount
        defaultReplicaCount: 2
      persistence:
        defaultClass: true
        defaultClassReplicaCount: 2

- name: Wait for Longhorn manager to be ready on all nodes
  delegate_to: localhost
  become: false
  run_once: true
  ansible.builtin.command: >-
    kubectl --kubeconfig {{ playbook_dir }}/../kubeconfig
    -n longhorn-system rollout status daemonset/longhorn-manager --timeout=300s
  changed_when: false

- name: Make Longhorn the only default StorageClass (unset k3s local-path default)
  delegate_to: localhost
  become: false
  run_once: true
  kubernetes.core.k8s:
    state: patched
    kind: StorageClass
    name: local-path
    kubeconfig: "{{ playbook_dir }}/../kubeconfig"
    definition:
      metadata:
        annotations:
          storageclass.kubernetes.io/is-default-class: "false"
