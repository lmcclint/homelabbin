apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: le-dns-porkbun
spec:
  acme:
    email: lee@2bit.name
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: le-account-key
    solvers:
      - dns01:
          webhook:
            groupName: porkbun.talinx.dev
            solverName: porkbun
            config:
              apiKey:
                name: porkbun-secret
                key: PORKBUN_API_KEY
              secretApiKey:
                name: porkbun-secret
                key: PORKBUN_SECRET_API_KEY
