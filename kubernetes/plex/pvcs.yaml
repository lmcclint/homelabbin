apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plex-media
  namespace: plex
spec:
  accessModes: ["ReadOnlyMany"]
  storageClassName: ""             # match the static PV (no class)
  volumeName: plex-media           # bind to the PV above
  resources:
    requests:
      storage: 100Ti
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plex-config
  namespace: plex
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: longhorn
  resources:
    requests:
      storage: 20Gi
